name: Sentinel CI — Eval & Lint

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ --select E,F,I

  eval:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: sentinel
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install setuptools wheel
          pip install -r requirements.txt
          pip install pytest
          pip install pytest-asyncio
          pip install pytest-cov

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Run eval harness (smoke — first 20 examples)
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: sentinel
          REDIS_URL: redis://localhost:6379/0
          VLLM_BASE_URL: ${{ secrets.VLLM_BASE_URL || 'http://localhost:8000/v1' }}
        run: |
          python -m app.eval.run_eval \
            --dataset data/eval_set.jsonl \
            --output reports/eval_report.json

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/eval_report.json
